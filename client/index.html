    <script>
      // Suppress console warnings and errors for known issues
      if (typeof window !== 'undefined' && typeof console !== 'undefined') {
        // Prevent HMR from causing refresh loops
        let hmrErrorCount = 0;
        const MAX_HMR_ERRORS = 10;
        
        // Suppress console errors for HMR WebSocket issues and module loading errors
        const originalError = console.error;
        const originalWarn = console.warn;
        
        // Track if we've already warned about server being offline
        let serverOfflineWarned = false;
        
        console.error = function(...args) {
          const message = args.join(' ');
          const fullMessage = args.map(arg => {
            if (typeof arg === 'string') return arg;
            if (arg?.message) return arg.message;
            if (arg?.stack) return arg.stack;
            return String(arg);
          }).join(' ');
          
          // Filter out Vite HMR WebSocket errors
          // Check for various WebSocket error patterns
          const isHmrError = 
            (message.includes('WebSocket connection') && 
             (message.includes('vite-hmr') || message.includes('localhost:2000') || message.includes('ws://'))) ||
            message.includes('[vite] failed to connect to websocket') ||
            message.includes('WebSocket closed without opened') ||
            message.includes('createConnection') ||
            message.includes('connect @ client') ||
            (fullMessage.includes('WebSocket') && fullMessage.includes('failed')) ||
            (fullMessage.includes('vite-hmr') && (fullMessage.includes('failed') || fullMessage.includes('error'))) ||
            (fullMessage.includes('ws://localhost:2000/vite-hmr') && fullMessage.includes('failed')) ||
            (fullMessage.includes('WebSocket connection to') && fullMessage.includes('vite-hmr') && fullMessage.includes('failed')) ||
            (args.some(arg => typeof arg === 'string' && arg.includes('ws://localhost:2000/vite-hmr')));
          
          if (isHmrError) {
            hmrErrorCount++;
            if (hmrErrorCount > MAX_HMR_ERRORS && window.__VITE_HMR__) {
              try {
                window.__VITE_HMR__.disconnect();
              } catch (e) {
                // Ignore disconnect errors
              }
            }
            return; // Suppress this error
          }
          
          // Filter out module loading errors when dev server is down
          // Check for various patterns of connection errors
          const isConnectionError = 
            fullMessage.includes('ERR_CONNECTION_REFUSED') ||
            fullMessage.includes('ERR_CONNECTION_RESET') ||
            fullMessage.includes('Failed to load module') ||
            fullMessage.includes('Loading chunk') && fullMessage.includes('failed') ||
            (fullMessage.includes('GET') && (fullMessage.includes('localhost:2000') || fullMessage.includes('net::ERR'))) ||
            (fullMessage.includes('http://localhost:2000') && fullMessage.includes('net::ERR')) ||
            (fullMessage.includes('localhost:2000') && (fullMessage.includes('ERR_') || fullMessage.includes('Failed'))) ||
            (fullMessage.includes('@fs/') && fullMessage.includes('localhost:2000')) ||
            (fullMessage.includes('/src/') && fullMessage.includes('localhost:2000') && fullMessage.includes('ERR_')) ||
            (fullMessage.includes('@react-refresh') && fullMessage.includes('localhost:2000')) ||
            (fullMessage.includes('env.mjs') && fullMessage.includes('localhost:2000')) ||
            (fullMessage.includes('vite/dist/client') && fullMessage.includes('localhost:2000')) ||
            (fullMessage.includes('index.css') && fullMessage.includes('localhost:2000') && fullMessage.includes('ERR_')) ||
            (fullMessage.includes('favicon') && fullMessage.includes('localhost:2000') && fullMessage.includes('ERR_')) ||
            (fullMessage.includes('site.webmanifest') && fullMessage.includes('localhost:2000') && fullMessage.includes('ERR_'));
          
          if (isConnectionError) {
            // Only log once to avoid spam
            if (!serverOfflineWarned) {
              serverOfflineWarned = true;
              originalWarn('⚠️ Development server appears to be offline. Please run "npm run dev" to start the server.');
            }
            return; // Suppress the error
          }
          
          // Suppress Content Security Policy font violations (e.g., from Stripe)
          // These are report-only violations that don't affect functionality
          if (message.includes('violates the following Content Security Policy directive') &&
              (message.includes("font-src") || message.includes("font-src 'none'"))) {
            return; // Suppress CSP font violations
          }
          
          // Suppress Permissions-Policy header errors (may come from third-party scripts)
          if (message.includes('Permissions-Policy header') ||
              message.includes('Unrecognized feature') ||
              message.includes('browsing-topics') ||
              message.includes('run-ad-auction') ||
              message.includes('join-ad-interest-group') ||
              message.includes('private-state-token') ||
              message.includes('private-aggregation') ||
              message.includes('attribution-reporting') ||
              message.includes('Origin trial controlled feature not enabled')) {
            return; // Suppress Permissions-Policy errors
          }
          
          // Suppress Cursor/Replit select-element tool truncation errors (payload > 225280 chars)
          // when selecting large DOM elements. See CURSOR_SELECT_ELEMENT.md for workarounds.
          if ((message.includes('truncated') && message.includes('225280')) ||
              (message.includes('element_selected') && message.includes('stableId')) ||
              (fullMessage.includes('sp.replit.com') && fullMessage.includes('400'))) {
            return; // Suppress select-element telemetry truncation
          }
          
          // Call original console.error for other errors
          originalError.apply(console, args);
        };
        
        // Also suppress warnings for connection issues and Google Places deprecation
        console.warn = function(...args) {
          const message = args.join(' ');
          const fullMessage = args.map(arg => {
            if (typeof arg === 'string') return arg;
            if (arg?.message) return arg.message;
            return String(arg);
          }).join(' ');
          
          // Suppress Google Places Autocomplete deprecation warning
          if (message.includes('google.maps.places.Autocomplete is not available to new customers') ||
              message.includes('PlaceAutocompleteElement') ||
              message.includes('As of March 1st, 2025') ||
              message.includes('google.maps.places.Autocomplete is not scheduled to be discontinued')) {
            return; // Suppress this specific warning
          }

          // Suppress Google Maps Marker deprecation warning (non-blocking; migration tracked separately)
          if (message.includes('google.maps.Marker is deprecated') ||
              message.includes('AdvancedMarkerElement') && message.includes('migration guide')) {
            return;
          }
          
          // Suppress Permissions-Policy header warnings from Google services
          if (message.includes('Permissions-Policy header') ||
              message.includes('Unrecognized feature') ||
              message.includes('browsing-topics') ||
              message.includes('run-ad-auction') ||
              message.includes('join-ad-interest-group') ||
              message.includes('private-state-token') ||
              message.includes('private-aggregation') ||
              message.includes('attribution-reporting') ||
              message.includes('Origin trial controlled feature not enabled')) {
            return; // Suppress Permissions-Policy warnings
          }
          
          // Suppress Content Security Policy font violations (e.g., from Stripe)
          if (message.includes('violates the following Content Security Policy directive') &&
              (message.includes("font-src") || message.includes("font-src 'none'"))) {
            return; // Suppress CSP font violations (these are report-only and don't affect functionality)
          }
          
          // Suppress warnings about connection issues
          if (
            fullMessage.includes('ERR_CONNECTION_REFUSED') ||
            fullMessage.includes('ERR_CONNECTION_RESET') ||
            (fullMessage.includes('localhost:2000') && fullMessage.includes('failed'))
          ) {
            return; // Suppress this warning
          }
          
          // Call original console.warn for other warnings
          originalWarn.apply(console, args);
        };
        
        // Also catch unhandled promise rejections from HMR and module loading
        window.addEventListener('unhandledrejection', (event) => {
          const message = event.reason?.message || event.reason?.toString() || '';
          const reason = event.reason;
          
          // Suppress WebSocket/HMR errors
          if (
            message.includes('WebSocket') && 
            (message.includes('vite-hmr') || message.includes('closed without opened') || message.includes('failed'))
          ) {
            event.preventDefault(); // Suppress the error
            hmrErrorCount++;
            if (hmrErrorCount > MAX_HMR_ERRORS && window.__VITE_HMR__) {
              try {
                window.__VITE_HMR__.disconnect();
              } catch (e) {
                // Ignore disconnect errors
              }
            }
            return;
          }
          
          // Suppress connection errors
          if (
            message.includes('ERR_CONNECTION_REFUSED') ||
            message.includes('ERR_CONNECTION_RESET') ||
            message.includes('Failed to fetch') ||
            (reason && typeof reason === 'object' && 'message' in reason && 
             (reason.message?.includes('ERR_CONNECTION') || reason.message?.includes('Failed to fetch')))
          ) {
            event.preventDefault(); // Suppress the error
            if (!serverOfflineWarned) {
              serverOfflineWarned = true;
              originalWarn('⚠️ Development server appears to be offline. Please run "npm run dev" to start the server.');
            }
            return;
          }
        });
        
        // Catch global errors (including network errors logged by browser)
        window.addEventListener('error', (event) => {
          const message = event.message || event.filename || '';
          const error = event.error;
          
          // Suppress module loading errors
          if (
            message.includes('ERR_CONNECTION_REFUSED') ||
            message.includes('ERR_CONNECTION_RESET') ||
            message.includes('Failed to load') ||
            message.includes('localhost:2000') ||
            message.includes('@react-refresh') ||
            message.includes('env.mjs') ||
            message.includes('vite/dist/client') ||
            message.includes('favicon') ||
            message.includes('site.webmanifest') ||
            (error && (
              error.message?.includes('ERR_CONNECTION') ||
              error.message?.includes('Failed to fetch') ||
              error.message?.includes('localhost:2000')
            ))
          ) {
            event.preventDefault(); // Suppress the error
            if (!serverOfflineWarned) {
              serverOfflineWarned = true;
              originalWarn('⚠️ Development server appears to be offline. Please run "npm run dev" to start the server.');
            }
            return false; // Prevent default error handling
          }

          // Suppress browser geolocation provider noise (not Maps Geocoding auth)
          if (
            message.includes('Network location provider') &&
            message.includes('www.googleapis.com') &&
            message.includes('error code 403')
          ) {
            event.preventDefault();
            return false;
          }
        }, true); // Use capture phase to catch errors early
      }
    </script>

            <div style="padding: 2rem; max-width: 600px; margin: 2rem auto; font-family: system-ui, sans-serif;">

              <button onclick="window.location.reload()" style="padding: 0.5rem 1rem; background: #3b82f6; color: white; border: none; border-radius: 0.25rem; cursor: pointer;">
                Retry Connection
              </button>
            </div>
          `;
        }
      }, 5000);
